<div class="max-w-2xl mx-auto bg-white p-6 rounded shadow">

  <h2 class="text-2xl font-semibold mb-4">Upload Document</h2>

  <form (submit)="onUpload($event)" enctype="multipart/form-data">

    <label class="block">
      <span class="text-gray-700">Select Document</span>
      <input
        type="file"
        (change)="onFileSelect($event)"
        class="mt-2 block w-full border p-2 rounded cursor-pointer"
        accept=".pdf,.doc,.docx,.txt"
        required
      >
    </label>

    <button
      type="submit"
      [disabled]="uploading"
      class="mt-4 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 disabled:opacity-50 transition cursor-pointer"
    >
      {{ uploading ? 'Uploading...' : 'Upload' }}
    </button>

  </form>

  <p *ngIf="message" [class]="isError ? 'mt-4 text-red-600' : 'mt-4 text-green-600'">
    {{ message }}
  </p>

</div>
