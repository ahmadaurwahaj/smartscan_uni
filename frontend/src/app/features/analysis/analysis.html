<!-- Loading and Error -->
<div *ngIf="loading" class="text-gray-500 italic text-lg text-center mt-10">Loading analysis...</div> 
<div *ngIf="error" class="text-red-600 font-semibold text-lg text-center mt-10">{{ error }}</div>

<!-- Main Analysis Card -->
<div *ngIf="!loading && !error && result" class="max-w-5xl mx-auto mt-10 bg-white rounded-2xl shadow-xl p-6">

  <!-- Header -->
  <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-6">
    <h2 class="text-3xl font-bold mb-2 md:mb-0">Task ID: {{ result.task_id }}</h2>
    <span [ngClass]="{
        'bg-green-500 text-white px-4 py-1 rounded-full font-semibold': result.status === 'completed',
        'bg-yellow-400 text-white px-4 py-1 rounded-full font-semibold': result.status === 'running',
        'bg-red-500 text-white px-4 py-1 rounded-full font-semibold': result.status === 'failed'
      }" class="text-sm">
      {{ result.status }}
    </span>
  </div>

  <!-- Progress Bar -->
  <div class="mb-6">
    <p class="mb-2 font-medium text-gray-700">Progress: {{ result.progress }}%</p>
    <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
      <div class="h-4 rounded-full bg-gradient-to-r from-blue-400 to-blue-600 transition-all duration-500"
           [style.width.%]="result.progress"></div>
    </div>
  </div>

  <!-- Keywords Table -->
  <div class="overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-200 rounded-lg">
      <thead class="bg-gray-50">
        <tr class="text-left text-gray-700 font-semibold">
          <th class="px-6 py-3">Keyword</th>
          <th class="px-6 py-3">Frequency</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-200">
        <tr *ngFor="let k of result.keywords" class="hover:bg-gray-100 transition-colors duration-200">
          <td class="px-6 py-3">{{ k.keyword }}</td>
          <td class="px-6 py-3">{{ k.frequency }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Footer Note -->
  <div class="mt-6 text-gray-500 italic text-sm">
    Analysis data is auto-generated. Updates in real-time as processing completes.
  </div>

</div>
