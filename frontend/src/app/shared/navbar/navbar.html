<div class="w-full h-16 bg-white shadow flex items-center px-6 justify-between">

  <div class="text-xl font-semibold text-gray-700">
    Smart Document System
  </div>

  <div class="flex items-center space-x-4">
    <div class="flex items-center space-x-2 px-3 py-2 rounded">
      <img [src]="'https://ui-avatars.com/api/?name=' + (user?.username || 'User')" class="w-8 h-8 rounded-full" />
      <span class="text-gray-700">{{ user?.username || 'User' }}</span>
    </div>

    <button
      (click)="logout()"
      class="bg-red-500 text-white px-3 py-1.5 rounded text-sm hover:bg-red-600 transition"
    >
      Logout
    </button>
  </div>

</div>
