<div class="w-full h-16 bg-white shadow flex items-center px-4 md:px-6 justify-between flex-shrink-0">

  <div class="flex items-center gap-3">
    <!-- Hamburger — mobile only -->
    <button
      (click)="toggleSidebar.emit()"
      class="md:hidden p-2 rounded text-gray-600 hover:bg-gray-100 transition cursor-pointer"
      aria-label="Toggle menu">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <span class="text-lg md:text-xl font-semibold text-gray-700">Smart Document System</span>
  </div>

  <div class="flex items-center space-x-3">
    <div class="hidden sm:flex items-center space-x-2 px-3 py-2 rounded">
      <img [src]="'https://ui-avatars.com/api/?name=' + (user?.username || 'User')" class="w-8 h-8 rounded-full" />
      <span class="text-gray-700 text-sm">{{ user?.username || 'User' }}</span>
    </div>
    <button
      (click)="logout()"
      class="bg-red-500 text-white px-3 py-1.5 rounded text-sm hover:bg-red-600 transition cursor-pointer">
      Logout
    </button>
  </div>

</div>
